<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <title>Post Show Report — Mining Forum Analytics</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Inter:wght@400;600;700;800&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    /* Dax-Bold: place DaxBold.woff2 in /fonts/ */
    @font-face {
      font-family: 'Dax';
      src: url('/fonts/DaxBold.woff2') format('woff2'), url('/fonts/DaxBold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    .psr-wrap { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

    /* Nav */
    .psr-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .psr-nav h2 { font-size: 20px; font-weight: 700; color: var(--header-mid); margin: 0; }
    .psr-nav-links { display: flex; gap: 8px; align-items: center; }
    .psr-nav-links .btn { padding: 8px 16px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; border: 2px solid #E0E0E0; background: transparent; color: var(--text-primary); font-family: inherit; }
    .psr-nav-links .btn:hover { border-color: var(--color-gold); }
    .psr-user-badge { font-size: 11px; color: #7F8C8D; padding: 6px 12px; background: #F5F6FA; border-radius: 6px; }
    .psr-user-badge strong { color: var(--header-mid); }

    /* Event selector */
    .event-selector { display: flex; gap: 0; margin-bottom: 20px; flex-wrap: wrap; }
    .event-sel-btn { padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid #E0E0E0; background: #F5F6FA; color: var(--text-secondary); font-family: inherit; }
    .event-sel-btn:first-child { border-radius: 8px 0 0 8px; }
    .event-sel-btn:not(:first-child) { border-left: none; }
    .event-sel-btn:last-child { border-radius: 0 8px 8px 0; }
    .event-sel-btn.active { background: var(--color-gold); color: #fff; border-color: var(--color-gold); }

    /* Bree Serif for all headers */
    h1, h2, h3, h4, h5, h6,
    .psr-nav h2, .report-header h1,
    .psr-section-header h3, .swot-card h4 { font-family: 'Bree Serif', 'Lato', 'Inter', serif; }

    /* Report header */
    .report-header { background: linear-gradient(135deg, #1B2631, #2C3E50); color: #fff; padding: 28px 32px; border-radius: 12px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .report-header .rh-content { flex: 1; }
    .report-header h1 { font-size: 24px; font-weight: 900; margin: 0 0 4px 0; }
    .report-header .rh-sub { font-size: 13px; opacity: 0.7; }
    .report-header .rh-meta { display: flex; gap: 24px; margin-top: 12px; font-size: 12px; }
    .report-header .rh-meta span { opacity: 0.8; }
    .report-header .rh-logo { flex-shrink: 0; }
    .report-header .rh-logo img { height: 56px; width: auto; opacity: 0.95; }

    /* Section cards */
    .psr-section { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #E8EAF0; margin-bottom: 20px; overflow: hidden; }
    .psr-section-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; cursor: pointer; user-select: none; border-bottom: 1px solid #E8EAF0; }
    .psr-section-header:hover { background: #FAFBFC; }
    .psr-section-header h3 { flex: 1; font-size: 15px; font-weight: 700; color: var(--header-mid); margin: 0; }
    .psr-section-header .section-num { font-size: 11px; font-weight: 700; color: #fff; background: var(--color-gold); width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .psr-section-header .toggle-icon { font-size: 14px; color: #999; flex-shrink: 0; transition: transform 0.2s; }
    .psr-section.collapsed .psr-section-body { display: none; }
    .psr-section.collapsed .toggle-icon { transform: rotate(-90deg); }
    .psr-section-body { padding: 20px; }

    /* SWOT grid */
    .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .swot-card { border-radius: 8px; padding: 16px; }
    .swot-card h4 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 10px 0; }
    .swot-card ul { margin: 0; padding: 0 0 0 18px; font-size: 12px; line-height: 1.7; color: var(--text-primary); }
    .swot-strengths { background: #EAFAF1; }
    .swot-strengths h4 { color: #1E8449; }
    .swot-weaknesses { background: #FDEDEC; }
    .swot-weaknesses h4 { color: #C0392B; }
    .swot-opportunities { background: #EBF5FB; }
    .swot-opportunities h4 { color: #1A5276; }
    .swot-threats { background: #FEF9E7; }
    .swot-threats h4 { color: #7D6608; }

    /* Data tables */
    .psr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .psr-table th { text-align: left; padding: 8px 12px; background: #F5F6FA; color: var(--text-secondary); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #E0E0E0; }
    .psr-table td { padding: 7px 12px; border-bottom: 1px solid #F0F2F5; color: var(--text-primary); }
    .psr-table tr:hover td { background: #FAFBFC; }
    .psr-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .psr-table th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 18px; }
    .psr-table th.sortable:hover { color: var(--text-primary); background: #ECEEF2; }
    .psr-table th.sortable::after { content: '⇅'; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 9px; opacity: 0.4; }
    .psr-table th.sortable.sort-asc::after { content: '▲'; opacity: 0.8; }
    .psr-table th.sortable.sort-desc::after { content: '▼'; opacity: 0.8; }
    .psr-table .pct { text-align: right; font-variant-numeric: tabular-nums; color: #666; }
    .psr-table .var-up { color: #1E8449; font-weight: 600; }
    .psr-table .var-down { color: #C0392B; font-weight: 600; }
    .psr-table .section-label { font-weight: 700; color: var(--header-mid); background: #F8F9FB; }
    .psr-table tfoot td { font-weight: 700; border-top: 2px solid #E0E0E0; }

    /* Chart containers */
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    .chart-box { background: #FAFBFC; border: 1px solid #E8EAF0; border-radius: 8px; padding: 16px; }
    .chart-box h4 { font-size: 12px; font-weight: 700; color: var(--header-mid); margin: 0 0 12px 0; }
    .chart-full { grid-column: 1 / -1; }

    /* Venue history */
    .venue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .venue-list h4 { font-size: 13px; font-weight: 700; color: var(--header-mid); margin: 0 0 10px 0; }

    /* Glossary */
    .glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .glossary-item { display: flex; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #F0F2F5; }
    .glossary-term { font-weight: 700; color: var(--header-mid); min-width: 120px; flex-shrink: 0; }
    .glossary-def { color: var(--text-primary); }

    /* SWOT items */
    .swot-card ul { list-style: none; padding: 0; }
    .swot-item { display: flex; align-items: flex-start; gap: 6px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .swot-item:last-child { border-bottom: none; }
    .swot-item-text { flex: 1; font-size: 12px; line-height: 1.6; color: var(--text-primary); min-height: 20px; }
    .swot-item-text[contenteditable="true"] { outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
    .swot-item-text[contenteditable="true"]:focus { background: rgba(255,255,255,0.8); box-shadow: 0 0 0 2px var(--color-gold); }
    .swot-item-text[contenteditable="true"]:hover { background: rgba(255,255,255,0.5); }
    .swot-item-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
    .swot-item:hover .swot-item-actions { opacity: 1; }
    .swot-btn-icon { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; color: #999; line-height: 1; }
    .swot-btn-icon:hover { background: rgba(0,0,0,0.08); color: #333; }
    .swot-btn-icon.delete:hover { color: #C0392B; }
    .swot-add-btn { display: block; width: 100%; margin-top: 8px; padding: 6px; font-size: 11px; font-weight: 600; color: #999; background: rgba(255,255,255,0.5); border: 1px dashed rgba(0,0,0,0.15); border-radius: 6px; cursor: pointer; font-family: inherit; text-align: center; }
    .swot-add-btn:hover { color: #333; border-color: rgba(0,0,0,0.3); background: rgba(255,255,255,0.8); }

    /* Inflation toggle */
    .inflation-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 10px 14px; background: #F8F9FB; border-radius: 8px; border: 1px solid #E0E0E0; flex-wrap: wrap; }
    .inflation-toggle { display: flex; background: #E0E0E0; border-radius: 6px; overflow: hidden; }
    .inflation-toggle button { padding: 5px 14px; font-size: 11px; font-weight: 600; border: none; background: transparent; cursor: pointer; font-family: inherit; color: #666; transition: all 0.15s; }
    .inflation-toggle button.active { background: var(--color-gold); color: #fff; }
    .base-year-wrap { display: flex; align-items: center; gap: 6px; }
    .base-year-wrap label { font-size: 11px; font-weight: 600; color: #666; }
    .base-year-wrap select { padding: 4px 8px; font-size: 11px; border: 2px solid #E0E0E0; border-radius: 6px; font-family: inherit; background: #fff; }
    .base-year-wrap select:focus { border-color: var(--color-gold); outline: none; }
    .inflation-note { font-size: 10px; color: #999; font-style: italic; }
    .btn-refresh-mcaps { margin-left: auto; padding: 5px 14px; font-size: 11px; font-weight: 600; border: 2px solid #E0E0E0; background: #fff; border-radius: 6px; cursor: pointer; font-family: inherit; color: var(--text-primary); white-space: nowrap; transition: all 0.15s; }
    .btn-refresh-mcaps:hover { border-color: var(--color-gold); background: #FFF9E6; }
    .btn-refresh-mcaps:disabled { opacity: 0.6; cursor: wait; }

    /* Editable venue cells */
    .venue-editable { cursor: text; outline: none; border-radius: 3px; transition: background 0.15s; }
    .venue-editable:hover { background: #FFF9E6; }
    .venue-editable:focus { background: #FFF3CC; box-shadow: inset 0 0 0 2px var(--color-gold); }

    /* Editable table cells */
    .psr-table td.editable { cursor: text; position: relative; }
    .psr-table td.editable:hover { background: #FFF9E6; }
    .psr-table td.editable:focus-within { background: #FFF3CC; }
    .psr-table td.editable input {
      width: 100%; border: none; background: transparent; font: inherit; color: inherit;
      text-align: right; outline: none; padding: 0; font-variant-numeric: tabular-nums;
    }
    .psr-table td.editable input:focus { background: rgba(212,160,23,0.08); border-radius: 3px; }
    .market-add-year { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; }
    .market-add-year input { width: 80px; padding: 6px 10px; font-size: 12px; border: 2px solid #E0E0E0; border-radius: 6px; font-family: inherit; text-align: center; }
    .market-add-year input:focus { border-color: var(--color-gold); outline: none; }
    .market-add-year button { padding: 6px 14px; font-size: 12px; font-weight: 600; border: 2px solid #E0E0E0; background: #fff; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .market-add-year button:hover { border-color: var(--color-gold); background: #FFF9E6; }
    .market-del-year { font-size: 11px; color: #C0392B; cursor: pointer; opacity: 0; transition: opacity 0.15s; margin-left: 4px; }
    .psr-table tr:hover .market-del-year { opacity: 0.6; }
    .market-del-year:hover { opacity: 1 !important; text-decoration: underline; }

    /* Members list */
    .member-reason { font-size: 11px; color: #999; font-style: italic; }

    /* Tracking modal */
    .tracking-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .tracking-modal { background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); max-width: 720px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; }
    .tracking-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #E8EAF0; }
    .tracking-modal-head h3 { font-size: 14px; font-weight: 700; color: var(--header-mid); margin: 0; }
    .tracking-modal-head .modal-count { font-size: 12px; color: #7F8C8D; font-weight: 400; margin-left: 8px; }
    .tracking-modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 4px 8px; border-radius: 4px; line-height: 1; }
    .tracking-modal-close:hover { background: #F0F2F5; color: #333; }
    .tracking-modal-body { overflow-y: auto; padding: 16px 20px; }
    .tracking-clickable { cursor: pointer; transition: background 0.1s; }
    .tracking-clickable:hover { background: #FFF9E6 !important; }

    /* Confidential footer */
    .psr-footer { text-align: center; padding: 20px; font-size: 11px; color: #999; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

    /* Download button */
    .btn-download { background: var(--color-gold); color: #fff; border: none; padding: 10px 20px; font-size: 13px; font-weight: 700; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .btn-download:hover { background: #B8860B; }

    /* Print styles */
    @media print {
      .psr-nav, .event-selector, .psr-nav-links, .btn-download { display: none !important; }
      .psr-section { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
      .psr-section.collapsed .psr-section-body { display: block !important; }
      .report-header { background: #1B2631 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

  <div class="page-header dgg-theme">
    <img class="logo" src="/logos/dgg-logo.png" alt="Denver Gold Group">
    <div class="header-text">
      <h1><a href="/">Mining Forum Event Analytics</a></h1>
      <div class="subtitle">Post Show Report</div>
    </div>
  </div>

  <div class="psr-wrap">

    <!-- Nav (populated by JS based on role) -->
    <div class="psr-nav">
      <h2 id="psr-title">Post Show Report</h2>
      <div class="psr-nav-links" id="psr-nav-links">
        <!-- Built by JS -->
      </div>
    </div>

    <!-- Event selector -->
    <div class="event-selector" id="event-selector"></div>

    <!-- Report content -->
    <div id="report-content">
      <div style="text-align:center;padding:60px;color:#7F8C8D">
        <h3>Loading report...</h3>
      </div>
    </div>

    <div class="psr-footer">Confidential: Not for Distribution</div>

  </div>

  <div class="page-footer">
    &copy; 2026 Denver Gold Group.
  </div>

  <script>
    // Build nav based on role before psr-report.js loads
    (function() {
      var role = null;
      if (sessionStorage.getItem('admin_token')) role = 'admin';
      else {
        var t = sessionStorage.getItem('psr_token');
        if (t) { var p = t.split('.'); if (p.length === 5 && p[0] === 'psr') role = p[2]; }
      }

      var nav = document.getElementById('psr-nav-links');
      var html = '';

      if (role === 'admin') {
        html += '<label class="btn" style="cursor:pointer" title="Upload PDF cover page"><input type="file" accept=".pdf" id="cover-page-input" onchange="PSR.setCoverPage(this)" style="display:none">Cover Page</label>';
        html += '<span id="cover-page-status" style="font-size:10px;color:#27AE60;display:none">&#10003;</span>';
      }

      html += '<button class="btn btn-download" onclick="downloadReport()">Download PDF</button>';

      if (role === 'admin') {
        html += '<a href="/admin" class="btn">Admin</a>';
      }

      html += '<a href="/activity-log" class="btn">Activity Log</a>';

      // User badge
      var user = null;
      try { user = JSON.parse(sessionStorage.getItem('psr_user')); } catch(e) {}
      if (user) {
        html += '<span class="psr-user-badge"><strong>' + (user.name || user.email) + '</strong> &middot; ' + user.role + '</span>';
      }

      html += '<button class="btn" onclick="psrLogout()">Log Out</button>';
      nav.innerHTML = html;
    })();

    function psrLogout() {
      sessionStorage.removeItem('psr_token');
      sessionStorage.removeItem('psr_user');
      sessionStorage.removeItem('admin_token');
      window.location.href = '/psr-login';
    }
  </script>
  <script src="/js/psr-report.js?v=93"></script>

</body>
</html>
