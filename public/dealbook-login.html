<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <title>M&amp;A Deal Book — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F0F2F5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .login-wrap { max-width: 420px; width: 100%; padding: 24px; }
    .login-card { background: #fff; border-radius: 12px; padding: 40px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-card .logo { height: 48px; margin-bottom: 24px; }
    .login-card h1 { font-size: 22px; font-weight: 800; color: #1B2631; margin-bottom: 6px; }
    .login-card .sub { font-size: 13px; color: #7F8C8D; margin-bottom: 24px; line-height: 1.5; }
    .login-card input[type="password"] {
      width: 100%; padding: 12px 16px; font-size: 14px;
      border: 2px solid #E0E0E0; border-radius: 8px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .login-card input[type="password"]:focus { border-color: #D4A017; }
    .btn-gold {
      display: block; width: 100%; margin-top: 16px; padding: 12px;
      font-size: 14px; font-weight: 700; font-family: inherit;
      border: none; border-radius: 8px; cursor: pointer;
      color: #fff; background: #D4A017; transition: background 0.2s;
    }
    .btn-gold:hover { background: #B8860B; }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
    .status.error { display: block; background: #FDEDEC; color: #C0392B; border: 1px solid #F5B7B1; }
    .footer { margin-top: 24px; font-size: 11px; color: #999; text-align: center; letter-spacing: 0.3px; }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <img class="logo" src="/logos/dgg-logo.png" alt="Denver Gold Group">
      <h1>M&amp;A Deal Book</h1>
      <p class="sub">Enter the access password to view deal analytics</p>
      <form id="login-form" onsubmit="doLogin(event)">
        <input type="password" id="pw-input" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="btn-gold" id="submit-btn">Sign In</button>
      </form>
      <div class="status" id="status"></div>
    </div>
    <div class="footer">Denver Gold Group &mdash; M&amp;A Deal Book</div>
  </div>

  <script>
    // If already authenticated, redirect
    var existingToken = sessionStorage.getItem('dealbook_token');
    if (existingToken) {
      window.location.href = '/';
    }

    // Also allow admin users through
    if (sessionStorage.getItem('admin_token')) {
      sessionStorage.setItem('dealbook_token', 'admin');
      window.location.href = '/';
    }

    function doLogin(e) {
      e.preventDefault();
      var pw = document.getElementById('pw-input').value;
      var btn = document.getElementById('submit-btn');
      var statusEl = document.getElementById('status');
      if (!pw) return;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      statusEl.className = 'status';

      fetch('/api/dealbook-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          sessionStorage.setItem('dealbook_token', data.token);
          var redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
          window.location.href = redirect;
        } else {
          statusEl.className = 'status error';
          statusEl.textContent = data.error || 'Invalid password';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      })
      .catch(function() {
        statusEl.className = 'status error';
        statusEl.textContent = 'Connection error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
    }
  </script>

</body>
</html>
